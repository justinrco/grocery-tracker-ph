<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Grocery Price Tracker{% endblock %}</title>
  <link rel="icon" href="data:image/svg+xml,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'&gt;&lt;text y='14' font-size='14'&gt;🛒&lt;/text&gt;&lt;/svg&gt;">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.bootstrap5.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body class="bg-body-tertiary">
  <nav class="navbar navbar-expand-lg navbar-dark bg-success mb-4">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{{ url_for('list_stores') }}">🛒 Grocery Tracker</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="{{ url_for('list_stores') }}">Stores</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('list_products') }}">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('compare') }}">Compare</a></li>
        </ul>
        <form class="d-flex navbar-search mt-2 mt-lg-0" action="{{ url_for('compare') }}" method="get" role="search">
          <input class="form-control me-2" type="search" name="q" placeholder="Find cheapest…"
                 value="{{ request.args.get('q', '') if request.endpoint == 'compare' else '' }}">
          <button class="btn btn-light" type="submit">Compare</button>
        </form>
      </div>
    </div>
  </nav>

  <main class="container pb-5">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>

  <datalist id="known-categories">
    {% for c in known_categories %}<option value="{{ c }}">{% endfor %}
  </datalist>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
  <script>
    // Turn each .category-select input into a searchable dropdown that also
    // lets you type a brand-new category. Existing categories come from the
    // #known-categories datalist (no duplication) and degrade gracefully to a
    // plain text input if this script or the CDN fails to load.
    document.addEventListener('DOMContentLoaded', function () {
      var dl = document.getElementById('known-categories');
      var categories = dl ? Array.from(dl.options).map(function (o) { return o.value; }) : [];
      document.querySelectorAll('.category-select').forEach(function (el) {
        var current = (el.value || '').trim();
        new TomSelect(el, {
          options: categories.map(function (c) { return { value: c, text: c }; }),
          items: current ? [current] : [],
          create: true,            // allow adding a new category not in the list
          persist: false,
          maxItems: 1,
          allowEmptyOption: true,
          sortField: { field: 'text', direction: 'asc' },
          render: {
            option_create: function (data, escape) {
              return '<div class="create">Add new category <strong>' + escape(data.input) + '</strong></div>';
            }
          }
        });
      });
    });
  </script>
</body>
</html>
